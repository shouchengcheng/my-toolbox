<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本地日历待办（支持数据导出导入）</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f7fa;
    color: #333;
    padding: 20px;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 24px;
    border-bottom: 1px solid #eee;
    background: #fafbfc;
    flex-wrap: wrap;
    gap: 10px;
  }
  .header h2 { font-size: 18px; font-weight: 600; }
  .header button,
  .header select {
    padding: 6px 12px;
    border: 1px solid #d0d7de;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    color: #333;
  }
  .header button:hover,
  .header select:hover { background: #f3f4f6; }
  .month-nav { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: #f6f8fa;
    border-bottom: 1px solid #eee;
  }
  .weekday {
    padding: 10px 0;
    text-align: center;
    font-size: 13px;
    color: #666;
    font-weight: 500;
  }
  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .day {
    min-height: 110px;
    border-right: 1px solid #eee;
    border-bottom: 1px solid #eee;
    padding: 8px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .day:nth-child(7n) { border-right: none; }
  .day:hover { background: #f8faff; }
  .day.other-month { color: #ccc; background: #fcfcfc; }
  .day.today .date-num {
    background: #2563eb;
    color: #fff;
    border-radius: 50%;
    width: 26px;
    height: 26px;
    line-height: 26px;
    text-align: center;
    display: inline-block;
  }
  .date-num {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
    display: inline-block;
  }
  .todo-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .todo-item {
    font-size: 12px;
    padding: 3px 6px;
    background: #eff6ff;
    border-radius: 4px;
    color: #1d4ed8;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: pointer;
  }
  .todo-item.done {
    background: #f0fdf4;
    color: #15803d;
    text-decoration: line-through;
    opacity: 0.7;
  }

  /* 弹窗 */
  .modal-mask {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-mask.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 10px;
    width: 560px;
    max-width: 92vw;
    max-height: 85vh;
    overflow: auto;
    padding: 22px;
  }
  .modal h3 {
    margin-bottom: 16px;
    font-size: 16px;
  }
  .modal label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
    margin-top: 12px;
    font-weight: 500;
  }
  .modal label:first-of-type { margin-top: 0; }
  .modal input[type="text"],
  .modal textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    line-height: 1.6;
  }
  .modal textarea {
    min-height: 200px;
  }
  .append-box {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed #eee;
  }
  .append-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }
  .append-row input {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
  }
  .append-row button {
    padding: 0 14px;
    border: none;
    background: #2563eb;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    white-space: nowrap;
  }
  .append-row button:hover { background: #1d4ed8; }

  .modal .todo-detail-item {
    padding: 12px;
    border: 1px solid #eee;
    border-radius: 6px;
    margin-bottom: 10px;
    font-size: 13px;
  }
  .modal .todo-detail-item .todo-title {
    font-weight: 500;
    margin-bottom: 8px;
    font-size: 14px;
  }
  .modal .todo-detail-item .todo-content {
    color: #444;
    font-size: 13px;
    line-height: 1.7;
    white-space: pre-wrap;
    margin-bottom: 8px;
    background: #fafbfc;
    padding: 10px 12px;
    border-radius: 4px;
    max-height: 240px;
    overflow-y: auto;
  }
  .modal .todo-detail-item .meta {
    font-size: 11px;
    color: #888;
    margin-top: 6px;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    align-items: center;
    margin-top: 18px;
  }
  .modal-actions .spacer { flex: 1; }
  .btn {
    padding: 7px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
  }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-ghost { background: #f3f4f6; color: #333; }
  .btn-ghost:hover { background: #e5e7eb; }
  .btn-danger { background: #fee2e2; color: #dc2626; }
  .btn-danger:hover { background: #fecaca; }
  .btn-small {
    padding: 3px 8px;
    font-size: 11px;
    margin-right: 4px;
  }

  /* 底部汇总表 */
  .summary-container {
    max-width: 1100px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    padding: 20px 24px;
  }
  .summary-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .summary-header h3 {
    font-size: 16px;
    font-weight: 600;
    color: #333;
    margin: 0;
  }
  .summary-tools {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-btns { display: flex; gap: 6px; }
  .filter-btn, .tool-btn {
    padding: 5px 12px;
    border: 1px solid #d0d7de;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: #333;
  }
  .filter-btn:hover, .tool-btn:hover { background: #f3f4f6; }
  .filter-btn.active {
    background: #2563eb;
    color: #fff;
    border-color: #2563eb;
  }
  #importFile { display: none; }
  .summary-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .summary-table th,
  .summary-table td {
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid #eee;
  }
  .summary-table th {
    background: #f6f8fa;
    font-weight: 500;
    color: #666;
  }
  .summary-table tr:last-child td {
    border-bottom: none;
  }
  .status-doing { color: #2563eb; }
  .status-done { color: #15803d; text-decoration: line-through; opacity: 0.8; }
  .clickable-text {
    cursor: pointer;
    transition: color 0.15s;
  }
  .clickable-text:hover {
    color: #2563eb;
    text-decoration: underline;
  }

  /* 分页 */
  .pagination {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    font-size: 13px;
    color: #666;
  }
  .pagination-btns { display: flex; gap: 6px; }
  .pagination-btns button {
    padding: 4px 10px;
    border: 1px solid #d0d7de;
    background: #fff;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
  }
  .pagination-btns button:hover:not(:disabled) { background: #f3f4f6; }
  .pagination-btns button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2 id="monthTitle">2026年6月</h2>
    <div class="month-nav">
      <select id="yearSelect" onchange="jumpToDate()"></select>
      <select id="monthSelect" onchange="jumpToDate()"></select>
      <button onclick="prevMonth()">上一月</button>
      <button onclick="goToday()">今天</button>
      <button onclick="nextMonth()">下一月</button>
    </div>
  </div>
  <div class="weekdays">
    <div class="weekday">周日</div>
    <div class="weekday">周一</div>
    <div class="weekday">周二</div>
    <div class="weekday">周三</div>
    <div class="weekday">周四</div>
    <div class="weekday">周五</div>
    <div class="weekday">周六</div>
  </div>
  <div class="calendar" id="calendar"></div>
</div>

<!-- 底部待办汇总 -->
<div class="summary-container">
  <div class="summary-header">
    <h3>全部待办汇总（按创建时间倒序）</h3>
    <div class="summary-tools">
      <button class="tool-btn" onclick="exportData()">导出数据</button>
      <button class="tool-btn" onclick="document.getElementById('importFile').click()">导入数据</button>
      <input type="file" id="importFile" accept=".json" onchange="importData(event)">
      <div class="filter-btns">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
        <button class="filter-btn" data-filter="doing" onclick="setFilter('doing')">未完成</button>
        <button class="filter-btn" data-filter="done" onclick="setFilter('done')">已完成</button>
      </div>
    </div>
  </div>
  <table class="summary-table">
    <thead>
      <tr>
        <th>所属日期（点击跳转月历）</th>
        <th>待办标题（点击可修改）</th>
        <th>创建时间</th>
        <th>状态</th>
        <th>完成时间</th>
      </tr>
    </thead>
    <tbody id="summaryTbody"></tbody>
  </table>
  <div class="pagination">
    <div id="pageInfo">共 0 条</div>
    <div class="pagination-btns">
      <button id="prevPageBtn" onclick="prevPage()" disabled>上一页</button>
      <span id="pageNum">第 1 页</span>
      <button id="nextPageBtn" onclick="nextPage()" disabled>下一页</button>
    </div>
  </div>
</div>

<!-- 添加待办弹窗 -->
<div class="modal-mask" id="addModal">
  <div class="modal">
    <h3 id="addModalTitle">添加待办 - 6月13日</h3>
    <label>标题</label>
    <input type="text" id="addTitleInput" placeholder="请输入待办标题">
    <label>详细内容 / 进度记录</label>
    <textarea id="addContentInput" placeholder="记录任务中间状态、排查过程、备注信息...支持多行"></textarea>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddModal()">取消</button>
      <button class="btn btn-primary" onclick="addTodo()">添加</button>
    </div>
  </div>
</div>

<!-- 编辑待办弹窗 -->
<div class="modal-mask" id="editModal">
  <div class="modal">
    <h3>编辑待办</h3>
    <label>标题</label>
    <input type="text" id="editTitleInput" placeholder="请输入待办标题">
    <label>详细内容 / 进度记录</label>
    <textarea id="editContentInput" placeholder="记录任务中间状态、排查过程、备注信息...支持多行"></textarea>
    
    <div class="append-box">
      <label style="margin-top:0;">快速追加记录（自动带时间戳）</label>
      <div class="append-row">
        <input type="text" id="editAppendInput" placeholder="输入本次进度，回车追加" onkeydown="if(event.key==='Enter')appendToEditContent()">
        <button onclick="appendToEditContent()">追加</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-danger" onclick="deleteEditingTodo()">删除该待办</button>
      <div class="spacer"></div>
      <button class="btn btn-ghost" onclick="closeEditModal()">取消</button>
      <button class="btn btn-primary" onclick="saveEditTodo()">保存</button>
    </div>
  </div>
</div>

<!-- 待办详情弹窗 -->
<div class="modal-mask" id="detailModal">
  <div class="modal">
    <h3 id="detailModalTitle">当日待办</h3>
    <div id="detailList"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeDetailModal()">关闭</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'local_calendar_todos';
  const PAGE_SIZE = 50;

  let todosCache = {};
  let sortedIndex = [];
  let currentDate = new Date();
  let selectedDateStr = '';
  let currentFilter = 'all';
  let currentPage = 1;
  let editingDateStr = '';
  let editingTodoId = null;
  let saveTimer = null;

  // ========== 数据导入导出 ==========
  function exportData() {
    const dataStr = JSON.stringify(todosCache, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `待办数据备份_${formatDate(new Date())}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importData(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (!file.name.endsWith('.json')) {
      alert('请选择 JSON 格式的数据文件');
      event.target.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        if (typeof data !== 'object' || Array.isArray(data)) {
          throw new Error('格式错误');
        }
        if (!confirm('导入将覆盖当前所有待办数据，确定继续吗？')) {
          event.target.value = '';
          return;
        }
        todosCache = data;
        rebuildSortedIndex();
        persistTodos();
        renderCalendar();
        alert('导入成功');
      } catch(err) {
        alert('文件格式错误，无法导入');
      }
      event.target.value = '';
    };
    reader.readAsText(file);
  }

  // ========== 数据层 ==========
  function loadTodos() {
    try {
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      let migrated = false;
      for (const dateStr in data) {
        data[dateStr].forEach(todo => {
          if (!todo.title && todo.content) {
            todo.title = todo.content;
            todo.content = '';
            migrated = true;
          }
        });
      }
      todosCache = data;
      rebuildSortedIndex();
      if (migrated) persistTodos();
    } catch(e) {
      todosCache = {};
      sortedIndex = [];
    }
  }

  function rebuildSortedIndex() {
    sortedIndex = [];
    for (const dateStr in todosCache) {
      todosCache[dateStr].forEach(todo => {
        sortedIndex.push({ ...todo, date: dateStr });
      });
    }
    sortedIndex.sort((a, b) => b.createTime - a.createTime);
  }

  function persistTodos() {
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(todosCache));
      } catch(e) {
        console.warn('持久化失败', e);
      }
    }, 300);
  }

  // ========== 工具函数 ==========
  function formatDate(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }
  function formatTime(ts) {
    const d = new Date(ts);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }
  function nowTimeStr() {
    return formatTime(Date.now());
  }
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ========== 日历渲染 ==========
  function initDateSelects() {
    const yearSelect = document.getElementById('yearSelect');
    const monthSelect = document.getElementById('monthSelect');
    for (let y = 2020; y <= 2035; y++) {
      const opt = document.createElement('option');
      opt.value = y;
      opt.textContent = y + '年';
      yearSelect.appendChild(opt);
    }
    for (let m = 1; m <= 12; m++) {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = m + '月';
      monthSelect.appendChild(opt);
    }
    updateSelects();
  }
  function updateSelects() {
    document.getElementById('yearSelect').value = currentDate.getFullYear();
    document.getElementById('monthSelect').value = currentDate.getMonth() + 1;
  }
  function jumpToDate() {
    const y = parseInt(document.getElementById('yearSelect').value);
    const m = parseInt(document.getElementById('monthSelect').value) - 1;
    currentDate = new Date(y, m, 1);
    renderCalendar();
  }

  // 点击日期仅跳转月历，不打开弹窗
  function jumpToDateMonth(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    currentDate = new Date(y, m - 1, d);
    renderCalendar();
    // 滚动到日历顶部，方便查看
    document.querySelector('.container').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function prevMonth() {
    currentDate.setMonth(currentDate.getMonth() - 1);
    renderCalendar();
  }
  function nextMonth() {
    currentDate.setMonth(currentDate.getMonth() + 1);
    renderCalendar();
  }
  function goToday() {
    currentDate = new Date();
    renderCalendar();
  }

  function renderCalendar() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    document.getElementById('monthTitle').textContent = `${year}年${month + 1}月`;

    const firstDay = new Date(year, month, 1);
    const startWeekday = firstDay.getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const daysInPrevMonth = new Date(year, month, 0).getDate();

    const calendar = document.getElementById('calendar');
    calendar.innerHTML = '';
    const todayStr = formatDate(new Date());

    for (let i = startWeekday - 1; i >= 0; i--) {
      const dayNum = daysInPrevMonth - i;
      const d = new Date(year, month - 1, dayNum);
      calendar.appendChild(createDayCell(d, true, todayStr));
    }
    for (let i = 1; i <= daysInMonth; i++) {
      const d = new Date(year, month, i);
      calendar.appendChild(createDayCell(d, false, todayStr));
    }
    const totalCells = startWeekday + daysInMonth;
    const remain = 42 - totalCells;
    for (let i = 1; i <= remain; i++) {
      const d = new Date(year, month + 1, i);
      calendar.appendChild(createDayCell(d, true, todayStr));
    }

    updateSelects();
    renderSummary();
  }

  function createDayCell(date, isOtherMonth, todayStr) {
    const dateStr = formatDate(date);
    const cell = document.createElement('div');
    cell.className = 'day' + (isOtherMonth ? ' other-month' : '');
    if (dateStr === todayStr) cell.classList.add('today');

    const num = document.createElement('div');
    num.className = 'date-num';
    num.textContent = date.getDate();
    cell.appendChild(num);

    const list = document.createElement('div');
    list.className = 'todo-list';
    const dayTodos = todosCache[dateStr] || [];

    dayTodos.slice(0, 3).forEach(t => {
      const item = document.createElement('div');
      item.className = 'todo-item' + (t.done ? ' done' : '');
      item.textContent = t.title || '(无标题)';
      item.onclick = (e) => { e.stopPropagation(); openDetailModal(dateStr); };
      list.appendChild(item);
    });
    if (dayTodos.length > 3) {
      const more = document.createElement('div');
      more.className = 'todo-item';
      more.style.opacity = '0.6';
      more.textContent = `+${dayTodos.length - 3} 更多`;
      more.onclick = (e) => { e.stopPropagation(); openDetailModal(dateStr); };
      list.appendChild(more);
    }

    cell.appendChild(list);
    cell.onclick = () => openAddModal(dateStr);
    return cell;
  }

  // ========== 汇总表 ==========
  function setFilter(filter) {
    currentFilter = filter;
    currentPage = 1;
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === filter);
    });
    renderSummary();
  }

  function getFilteredList() {
    if (currentFilter === 'all') return sortedIndex;
    return sortedIndex.filter(t => currentFilter === 'doing' ? !t.done : t.done);
  }

  function renderSummary() {
    const filtered = getFilteredList();
    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (currentPage > totalPages) currentPage = totalPages;

    const start = (currentPage - 1) * PAGE_SIZE;
    const pageData = filtered.slice(start, start + PAGE_SIZE);

    const tbody = document.getElementById('summaryTbody');
    if (pageData.length === 0) {
      const emptyText = currentFilter === 'all' ? '暂无待办记录' : 
                        currentFilter === 'doing' ? '暂无未完成待办' : '暂无已完成待办';
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#999;padding:20px;">${emptyText}</td></tr>`;
    } else {
      const fragment = document.createDocumentFragment();
      pageData.forEach(item => {
        const tr = document.createElement('tr');
        const statusClass = item.done ? 'status-done' : 'status-doing';
        const statusText = item.done ? '已完成' : '进行中';
        tr.innerHTML = `
          <td class="clickable-text" onclick="jumpToDateMonth('${item.date}')">${item.date}</td>
          <td class="clickable-text" onclick="openEditModal('${item.date}', ${item.id})">${escapeHtml(item.title || '(无标题)')}</td>
          <td>${formatTime(item.createTime)}</td>
          <td class="${statusClass}">${statusText}</td>
          <td>${item.finishTime ? formatTime(item.finishTime) : '-'}</td>
        `;
        fragment.appendChild(tr);
      });
      tbody.innerHTML = '';
      tbody.appendChild(fragment);
    }

    document.getElementById('pageInfo').textContent = `共 ${total} 条，每页 ${PAGE_SIZE} 条`;
    document.getElementById('pageNum').textContent = `第 ${currentPage} / ${totalPages} 页`;
    document.getElementById('prevPageBtn').disabled = currentPage <= 1;
    document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
  }

  function prevPage() {
    if (currentPage > 1) {
      currentPage--;
      renderSummary();
    }
  }
  function nextPage() {
    const totalPages = Math.ceil(getFilteredList().length / PAGE_SIZE);
    if (currentPage < totalPages) {
      currentPage++;
      renderSummary();
    }
  }

  // ========== 编辑功能 ==========
  function openEditModal(dateStr, todoId) {
    editingDateStr = dateStr;
    editingTodoId = todoId;
    const dayTodos = todosCache[dateStr] || [];
    const todo = dayTodos.find(t => t.id === todoId);
    if (!todo) return;

    document.getElementById('editTitleInput').value = todo.title || '';
    document.getElementById('editContentInput').value = todo.content || '';
    document.getElementById('editAppendInput').value = '';
    document.getElementById('editModal').classList.add('show');
    setTimeout(() => document.getElementById('editAppendInput').focus(), 50);
  }

  function closeEditModal() {
    document.getElementById('editModal').classList.remove('show');
    editingDateStr = '';
    editingTodoId = null;
  }

  function appendToEditContent() {
    const input = document.getElementById('editAppendInput');
    const text = input.value.trim();
    if (!text) return;

    const contentEl = document.getElementById('editContentInput');
    const oldContent = contentEl.value;
    const newLine = `[${nowTimeStr()}] ${text}`;
    
    contentEl.value = oldContent ? oldContent + '\n' + newLine : newLine;
    input.value = '';
    input.focus();
    contentEl.scrollTop = contentEl.scrollHeight;
  }

  function deleteEditingTodo() {
    if (!confirm('确定删除这条待办吗？删除后无法恢复。')) return;
    if (!editingDateStr || !editingTodoId) return;

    const dayTodos = todosCache[editingDateStr] || [];
    todosCache[editingDateStr] = dayTodos.filter(t => t.id !== editingTodoId);
    if (todosCache[editingDateStr].length === 0) delete todosCache[editingDateStr];
    
    rebuildSortedIndex();
    persistTodos();
    closeEditModal();
    renderCalendar();
  }

  function saveEditTodo() {
    const title = document.getElementById('editTitleInput').value.trim();
    const content = document.getElementById('editContentInput').value.trim();
    if (!title || !editingDateStr || !editingTodoId) {
      alert('标题不能为空');
      return;
    }

    const dayTodos = todosCache[editingDateStr] || [];
    const item = dayTodos.find(t => t.id === editingTodoId);
    if (item) {
      item.title = title;
      item.content = content;
      rebuildSortedIndex();
      persistTodos();
      closeEditModal();
      renderCalendar();
    }
  }

  // ========== 添加待办 ==========
  function openAddModal(dateStr) {
    selectedDateStr = dateStr;
    const d = new Date(dateStr);
    document.getElementById('addModalTitle').textContent =
      `添加待办 - ${d.getMonth()+1}月${d.getDate()}日`;
    document.getElementById('addTitleInput').value = '';
    document.getElementById('addContentInput').value = '';
    document.getElementById('addModal').classList.add('show');
    setTimeout(() => document.getElementById('addTitleInput').focus(), 50);
  }
  function closeAddModal() {
    document.getElementById('addModal').classList.remove('show');
  }
  function addTodo() {
    const title = document.getElementById('addTitleInput').value.trim();
    const content = document.getElementById('addContentInput').value.trim();
    if (!title) {
      alert('请输入待办标题');
      return;
    }

    if (!todosCache[selectedDateStr]) todosCache[selectedDateStr] = [];
    const newTodo = {
      id: Date.now(),
      title,
      content,
      createTime: Date.now(),
      done: false,
      finishTime: null
    };
    todosCache[selectedDateStr].push(newTodo);
    
    sortedIndex.unshift({ ...newTodo, date: selectedDateStr });
    persistTodos();
    closeAddModal();
    renderCalendar();
  }

  // ========== 详情弹窗 ==========
  function openDetailModal(dateStr) {
    selectedDateStr = dateStr;
    const d = new Date(dateStr);
    document.getElementById('detailModalTitle').textContent =
      `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 待办详情`;

    const list = todosCache[dateStr] || [];
    const container = document.getElementById('detailList');
    container.innerHTML = '';

    if (list.length === 0) {
      container.innerHTML = '<p style="color:#999;font-size:13px;padding:10px 0;">当日暂无待办</p>';
    } else {
      list.forEach(t => {
        const item = document.createElement('div');
        item.className = 'todo-detail-item';
        const statusText = t.done
          ? `<span style="color:#15803d;">✓ 已完成</span>`
          : `<span style="color:#2563eb;">进行中</span>`;
        item.innerHTML = `
          <div class="todo-title">
            <label style="display:flex;align-items:center;gap:6px;">
              <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${t.id})">
              <span style="${t.done?'text-decoration:line-through;color:#888;':''}">${escapeHtml(t.title || '(无标题)')}</span>
            </label>
          </div>
          ${t.content ? `<div class="todo-content">${escapeHtml(t.content)}</div>` : ''}
          
          <div class="append-box">
            <div class="append-row">
              <input type="text" placeholder="快速追加进度，回车记录" 
                     onkeydown="if(event.key==='Enter'){appendFromDetail(${t.id}, this.value); this.value='';}">
              <button onclick="const inp=this.previousElementSibling; appendFromDetail(${t.id}, inp.value); inp.value=''; inp.focus();">追加</button>
            </div>
          </div>

          <div class="meta">
            创建：${formatTime(t.createTime)}
            ${t.finishTime ? '<br>完成：' + formatTime(t.finishTime) : ''}
          </div>
          <div style="margin-top:8px;">
            <button class="btn btn-danger btn-small" onclick="deleteTodo(${t.id})">删除</button>
            <button class="btn btn-ghost btn-small" onclick="closeDetailModal();openEditModal('${dateStr}', ${t.id})">完整编辑</button>
            ${statusText}
          </div>
        `;
        container.appendChild(item);
      });
    }
    document.getElementById('detailModal').classList.add('show');
  }
  function closeDetailModal() {
    document.getElementById('detailModal').classList.remove('show');
  }

  function appendFromDetail(todoId, text) {
    if (!text.trim()) return;
    const dayTodos = todosCache[selectedDateStr] || [];
    const item = dayTodos.find(t => t.id === todoId);
    if (!item) return;

    const newLine = `[${nowTimeStr()}] ${text.trim()}`;
    item.content = item.content ? item.content + '\n' + newLine : newLine;
    rebuildSortedIndex();
    persistTodos();
    renderCalendar();
    openDetailModal(selectedDateStr);
  }

  function toggleTodo(id) {
    const dayTodos = todosCache[selectedDateStr] || [];
    const item = dayTodos.find(t => t.id === id);
    if (item) {
      item.done = !item.done;
      item.finishTime = item.done ? Date.now() : null;
      rebuildSortedIndex();
      persistTodos();
      renderCalendar();
      openDetailModal(selectedDateStr);
    }
  }

  function deleteTodo(id) {
    if (!confirm('确定删除这条待办吗？')) return;
    const dayTodos = todosCache[selectedDateStr] || [];
    todosCache[selectedDateStr] = dayTodos.filter(t => t.id !== id);
    if (todosCache[selectedDateStr].length === 0) delete todosCache[selectedDateStr];
    rebuildSortedIndex();
    persistTodos();
    renderCalendar();
    openDetailModal(selectedDateStr);
  }

  // 点击遮罩关闭弹窗
  document.querySelectorAll('.modal-mask').forEach(mask => {
    mask.addEventListener('click', e => {
      if (e.target === mask) mask.classList.remove('show');
    });
  });

  // 初始化
  loadTodos();
  initDateSelects();
  renderCalendar();
</script>
</body>
</html>
